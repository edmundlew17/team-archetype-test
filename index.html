<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;700;900&display=swap');
  :root{--bg:#f4f2ed;--surface:#fff;--border:#dedad3;--border-dark:#c8c3bb;--accent:#d63b1f;--text:#111;--muted:#888880}
  *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden}

  #intro{align-items:center;justify-content:center;padding:0 40px;min-height:100vh}

  .intro-headline{font-size:clamp(26px,6vw,40px);font-weight:900;line-height:1.4;color:var(--text);margin-bottom:10px;letter-spacing:-0.5px}

  .intro-sub{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:44px;font-weight:300}
  .btn-start{display:inline-flex;align-items:center;gap:14px;background:var(--text);color:#fff;font-weight:900;font-size:13px;padding:16px 36px;border:none;cursor:pointer;letter-spacing:3px;transition:background .18s,transform .18s}
  .btn-start:hover{background:var(--accent);transform:translateY(-1px)}
  .btn-arrow{font-size:16px;transition:transform .18s}.btn-start:hover .btn-arrow{transform:translateX(4px)}
  .intro-meta{margin-top:24px;font-size:11px;color:var(--muted);letter-spacing:2px}

  #quiz{padding:0;align-items:stretch}

  .q-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);min-width:48px}
  .progress-bar{flex:1;height:2px;background:var(--border);overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);transition:width .4s cubic-bezier(.4,0,.2,1)}
  .q-counter{font-size:11px;color:var(--muted);letter-spacing:1px}
  .quiz-body{flex:1;display:flex;flex-direction:column;padding:44px 28px 64px;max-width:560px;margin:0 auto;width:100%}
  .question-text{font-size:clamp(17px,4.5vw,22px);font-weight:700;line-height:1.6;margin-bottom:32px;color:var(--text);white-space:pre-line}
  .options{display:flex;flex-direction:column;gap:10px}
  .option-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:18px 20px 18px 56px;text-align:left;cursor:pointer;font-size:14px;line-height:1.65;font-weight:400;transition:border-color .15s,background .15s;position:relative}
  .option-btn::before{content:attr(data-label);font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--border-dark);position:absolute;left:20px;top:50%;transform:translateY(-50%);transition:color .15s}
  .option-btn:hover{border-color:var(--accent);background:#fdf5f4}.option-btn:hover::before{color:var(--accent)}
  .option-btn.selected{border-color:var(--accent);background:#fdf5f4}.option-btn.selected::before{color:var(--accent)}

  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:40px;gap:16px}
  .btn-prev{background:none;border:1px solid var(--border);color:var(--muted);padding:13px 24px;cursor:pointer;font-size:13px;transition:border-color .15s,color .15s}
  .btn-prev:hover{border-color:var(--text);color:var(--text)}
  .btn-next{background:var(--text);border:none;color:#fff;padding:13px 36px;cursor:pointer;font-weight:900;font-size:14px;letter-spacing:1px;transition:background .15s}
  .btn-next:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}.btn-next:not(:disabled):hover{background:var(--accent)}

  /* RESULT */
  #result{align-items:center;justify-content:flex-start;padding:0 0 80px}
  .result-hero{width:100%;background:var(--text);padding:48px 28px 56px;display:flex;flex-direction:column;align-items:center}
  .result-photo-wrap{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:6px;overflow:hidden;position:relative;background:#1a1a1a;margin-bottom:36px}

  .result-photo-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(255,255,255,0.06);letter-spacing:8px;background:linear-gradient(160deg,#1a1a1a 0%,#2d2d2d 100%)}
  .result-tag{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,0.3);text-transform:uppercase;font-weight:700;margin-bottom:14px}
  .result-type{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,12vw,72px);line-height:1;color:#fff;letter-spacing:3px;margin-bottom:6px;text-align:center}
  .result-subtype{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:3px;margin-bottom:6px}
  .result-zhname{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:3px;font-weight:700;margin-bottom:32px}
  .result-why{max-width:420px;font-size:14px;line-height:2;font-weight:300;color:rgba(255,255,255,0.55);text-align:center;border-top:1px solid rgba(255,255,255,0.08);padding-top:28px}

  .result-body{max-width:500px;width:100%;padding:48px 28px 0}
  .section-label{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:20px;font-weight:700}
  .achieve-section{margin-bottom:44px}
  .achieve-list{list-style:none;display:flex;flex-direction:column;gap:12px}
  .achieve-list li{display:flex;align-items:flex-start;gap:12px;font-size:13px;line-height:1.7;color:var(--text)}
  .achieve-list li::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:8px}
  .divider{height:1px;background:var(--border);margin:36px 0}
  .radar-section{margin-bottom:44px}
  .radar-wrap{padding:10px 0}
  .radar-note{font-size:12px;color:var(--muted);line-height:1.8;margin-top:16px;padding:16px;background:rgba(0,0,0,0.02);border:1px solid var(--border)}
  .share-row{display:flex;flex-direction:column;gap:10px;margin-top:44px}
  .btn-share{background:var(--text);border:none;color:#fff;padding:16px;cursor:pointer;font-weight:700;font-size:14px;letter-spacing:1px;transition:background .15s;width:100%}
  .btn-share:hover{background:var(--accent)}
  .btn-retry{background:none;border:1px solid var(--border);color:var(--muted);padding:14px;cursor:pointer;font-size:13px;transition:border-color .15s,color .15s;width:100%}
  .btn-retry:hover{border-color:var(--text);color:var(--text)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .screen.active .intro-inner{animation:fadeUp .5s ease both}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--text);color:#fff;padding:12px 28px;font-weight:700;font-size:13px;transition:transform .3s ease;z-index:9999;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>

<body>

<script>
const TOTAL_Q=18;
// 六维: [冲劲, 引领, 独立, 极致, 行动力, 格局]
const DIM_MAX=[19,16,12,15,17,10];

const questions=[
  {text:`小组作业，四个人的组，你打开共享文档发现只有你写了，其他三位大仙的部分空空如也，明天就要交了。你的第一反应是：`,
    options:[
      {text:`行，老子一个人写完，写完退群。`,score:[1,0,2,0,1,0]},
      {text:`在群里优雅地发一句「温馨提示：明天要交哦～」然后静静等待奇迹。`,score:[0,0,1,0,0,0]},
      {text:`直接挨个打电话：「你那部分写了吗？没写现在开始写，我盯着你。」`,score:[1,2,0,0,0,0]},
    ]},
  {text:`导员突然在年级群发了个「创新创业大赛」的通知，奖金五千，但题目你完全没接触过。`,

    ]},
  {text:`大学四年最魔幻的体验：你交着平均每节课200块的学费，坐在教室里看老师打开去年的PPT——去年的，因为页脚日期还没改。前排在考研刷题，后排在睡觉，中间那位在认真逛淘宝。此刻你在想——`,
    options:[
      {text:`我为什么要坐在这里。`,score:[2,0,0,0,0,0]},
      {text:`确实有点魔幻，但也有不错的课。`,score:[1,0,0,0,0,0]},

  {text:`做完一件事，结果只是「还行」「能交差」的水平。你内心的真实状态是——`,
    options:[
      {text:`差不多得了，人生苦短，及格万岁。`,score:[0,0,0,0,1,0]},
      {text:`看情况，重要的事会多打磨一下。`,score:[0,0,0,1,0,0]},

      {text:`有人组织我就帮忙，但我不太想当那个出头的。`,score:[0,1,0,0,0,0]},
      {text:`跟我有什么关系，我连晚会都不想去。`,score:[0,0,2,0,0,0]},
    ]},
  {text:`你负责课程展示，发现PPT里有一页图表配色不统一，内容没问题但看着不舒服。还有二十分钟上台。`,
    options:[
      {text:`谁看配色啊，内容对就行，收工。`,score:[0,0,0,0,2,0]},

let answers=new Array(TOTAL_Q).fill(null),current=0,advanceTimer=null;
function startQuiz(){showScreen('quiz');renderQ()}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

function renderQ(){
  if(current<0||current>=TOTAL_Q)return;const q=questions[current];if(!q)return;const n=current+1;
  document.getElementById('q-num').textContent=String(n).padStart(2,'0');
  document.getElementById('q-counter').textContent=`${n} / ${TOTAL_Q}`;
  document.getElementById('progress-fill').style.width=`${n/TOTAL_Q*100}%`;
  document.getElementById('question-text').textContent=q.text;
  const opts=document.getElementById('options');opts.innerHTML='';
  q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn'+(answers[current]===i?' selected':'');btn.setAttribute('data-label','ABCD'[i]);btn.appendChild(document.createTextNode(opt.text));btn.onclick=()=>selectOption(i);opts.appendChild(btn)});
  document.getElementById('btn-prev').style.visibility=current===0?'hidden':'visible';
  const nb=document.getElementById('btn-next');
  if(current===TOTAL_Q-1){nb.style.display='';nb.disabled=answers[current]===null;nb.textContent='查看结果 →'}else{nb.style.display='none'}
  const body=document.getElementById('quiz-body');body.style.opacity='1';body.style.animation='none';void body.offsetHeight;body.style.animation='fadeUp .25s ease both';
}
function selectOption(i){answers[current]=i;document.querySelectorAll('.option-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));document.getElementById('btn-next').disabled=false;if(current<TOTAL_Q-1){clearTimeout(advanceTimer);const body=document.getElementById('quiz-body');body.style.transition='opacity .15s';body.style.opacity='0';advanceTimer=setTimeout(()=>{body.style.transition='';current++;renderQ()},180)}}
function nextQ(){if(answers[current]===null)return;if(current<TOTAL_Q-1){current++;renderQ()}else showResult()}
function prevQ(){clearTimeout(advanceTimer);const body=document.getElementById('quiz-body');body.style.transition='';body.style.opacity='1';if(current>0){current--;renderQ()}}

function calcNorm(){const raw=[0,0,0,0,0,0];answers.forEach((ans,qi)=>{if(ans===null)return;const opt=questions[qi]?.options[ans];if(!opt)return;opt.score.forEach((v,i)=>raw[i]+=v)});return raw.map((v,i)=>Math.min(100,Math.round(v/DIM_MAX[i]*100)))}
function cosineSim(u,r){const dot=u.reduce((s,v,i)=>s+v*r[i],0);const mU=Math.sqrt(u.reduce((s,v)=>s+v*v,0));const mR=Math.sqrt(r.reduce((s,v)=>s+v*v,0));return(mU&&mR)?dot/(mU*mR):0}

function makeRadar(scores){
  const W=340,H=340,cx=170,cy=170,R=110,N=6;
  const ang=i=>(Math.PI*2*i/N)-Math.PI/2;
  const px=(i,p)=>cx+R*(p/100)*Math.cos(ang(i));
  const py=(i,p)=>cy+R*(p/100)*Math.sin(ang(i));
  let s='';
  [25,50,75,100].forEach(p=>{const pts=Array.from({length:N},(_,i)=>`${px(i,p).toFixed(1)},${py(i,p).toFixed(1)}`).join(' ');s+=`<polygon points="${pts}" fill="none" stroke="${p===100?'#c8c3bb':'#eae7e2'}" stroke-width="${p===100?.8:.4}"/>`});
  for(let i=0;i<N;i++)s+=`<line x1="${cx}" y1="${cy}" x2="${px(i,100).toFixed(1)}" y2="${py(i,100).toFixed(1)}" stroke="#eae7e2" stroke-width=".4"/>`;
  s+=`<polygon points="${Array.from({length:N},(_,i)=>`${px(i,scores[i]).toFixed(1)},${py(i,scores[i]).toFixed(1)}`).join(' ')}" fill="rgba(214,59,31,.1)" stroke="#d63b1f" stroke-width="2"/>`;
  for(let i=0;i<N;i++)s+=`<circle cx="${px(i,scores[i]).toFixed(1)}" cy="${py(i,scores[i]).toFixed(1)}" r="3.5" fill="#d63b1f"/>`;
  const anch=['middle','start','start','middle','end','end'];
  const ox=[0,10,10,0,-10,-10],oy=[-12,0,4,16,4,0];
  for(let i=0;i<N;i++){const lx=px(i,120)+ox[i],ly=py(i,120)+oy[i];
    s+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anch[i]}" dominant-baseline="central" font-family="Noto Sans SC,sans-serif" font-size="11" font-weight="700" fill="#333">${DIM_LABELS[i]}</text>`;
    s+=`<text x="${lx.toFixed(1)}" y="${(ly+15).toFixed(1)}" text-anchor="${anch[i]}" dominant-baseline="central" font-family="Bebas Neue,sans-serif" font-size="16" fill="#d63b1f">${scores[i]}</text>`}
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">${s}</svg>`;
}

function showResult(){
  const norm=calcNorm();const[a,b,c,d,e,f]=norm;
  let usedCosine=false;
  let matched=results.find(r=>r.match(a,b,c,d,e,f));
  if(!matched){usedCosine=true;matched=results.reduce((best,r)=>cosineSim(norm,r.vec)>cosineSim(norm,best.vec)?r:best,results[0])}
  const imgEl=document.getElementById('result-img');const fbEl=document.getElementById('result-fallback');
  if(matched.img){imgEl.src=matched.img;imgEl.style.display='block';fbEl.style.display='none'}
  else{imgEl.style.display='none';fbEl.style.display='flex';fbEl.textContent=matched.ref.split(' ').map(w=>w[0]).join('').toUpperCase()}
  document.getElementById('result-type').textContent=matched.ref;
  document.getElementById('result-subtype').textContent=matched.name;
  document.getElementById('result-zhname').textContent=matched.zhName;
  document.getElementById('result-why').textContent=matched.whyYou;
  document.getElementById('achieve-list').innerHTML=matched.highlights.map(h=>`<li>${h}</li>`).join('');
  document.getElementById('radar-wrap').innerHTML=makeRadar(norm);
  // analysis
  const sorted=DIM_LABELS.map((l,i)=>({l,v:norm[i],lo:DIM_ENDS[i][0],hi:DIM_ENDS[i][1]})).sort((a,b)=>b.v-a.v);
  const t=sorted[0],s2=sorted[1],lo=sorted[5];
  let note=`你的核心驱动力是「${t.l}」（${t.v}）`;
  if(s2.v>=40)note+=`与「${s2.l}」（${s2.v}）`;
  note+=`，在团队中天然倾向${t.hi}型的行事风格。`;
  note+=`相对而言，「${lo.l}」是你最低的维度（${lo.v}），说明你更偏${lo.lo}而非${lo.hi}。`;
  if(!usedCosine)note+=`\n匹配方式：精确规则命中`;
  else note+=`\n匹配方式：余弦相似度`;
  document.getElementById('radar-note').textContent=note;
  showScreen('result');window._rd={matched,norm};
}

function doScreenshot(){window.scrollTo({top:0,behavior:'smooth'});showToast('请截屏后分享给好友')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function restartQuiz(){clearTimeout(advanceTimer);answers=new Array(TOTAL_Q).fill(null);current=0;startQuiz()}
</script>
