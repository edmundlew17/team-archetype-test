<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="测一测你在团队里，到底是哪种不好惹的大佬">
<meta property="og:type" content="website">
<title>团队里哪种不好惹的大佬？</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;700;900&display=swap');

  :root {
    --bg: #f4f2ed;
    --surface: #ffffff;
    --border: #dedad3;
    --border-dark: #c8c3bb;
    --accent: #d63b1f;
    --text: #111111;
    --muted: #888880;
    --card: #faf9f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── INTRO ── */
  #intro {
    align-items: center;
    justify-content: center;
    padding: 0 36px;
    min-height: 100vh;
  }

  .intro-inner {
    max-width: 520px;
    width: 100%;
  }

  .intro-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 11vw, 82px);
    line-height: 1.06;
    color: var(--text);
    margin-bottom: 56px;
  }

  .intro-headline em {
    font-style: normal;
    color: var(--accent);
  }

  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: var(--text);
    color: #fff;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 900;
    font-size: 15px;
    padding: 18px 40px;
    border: none;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.18s, transform 0.18s;
  }

  .btn-start:hover { background: var(--accent); transform: translateY(-1px); }

  .btn-arrow { font-size: 18px; transition: transform 0.18s; }
  .btn-start:hover .btn-arrow { transform: translateX(4px); }

  .intro-meta {
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* ── QUIZ ── */
  #quiz { padding: 0; align-items: stretch; }

  .quiz-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .q-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--accent);
    min-width: 52px;
  }

  .progress-bar {
    flex: 1;
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .q-counter { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  .quiz-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 44px 28px 64px;
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
  }

  .question-text {
    font-size: clamp(18px, 5vw, 23px);
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 36px;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 18px 20px 18px 56px;
    text-align: left;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    line-height: 1.65;
    font-weight: 400;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .option-btn::before {
    content: attr(data-label);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--border-dark);
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    transition: color 0.15s;
  }

  .option-btn:hover { border-color: var(--accent); background: #fdf5f4; }
  .option-btn:hover::before { color: var(--accent); }
  .option-btn.selected { border-color: var(--accent); background: #fdf5f4; }
  .option-btn.selected::before { color: var(--accent); }
  .option-btn.selected::after {
    content: '✓';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 16px;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
    gap: 16px;
  }

  .btn-prev {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 13px 24px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-prev:hover { border-color: var(--text); color: var(--text); }

  .btn-next {
    background: var(--text);
    border: none;
    color: #fff;
    padding: 13px 36px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  .btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-next:not(:disabled):hover { background: var(--accent); }

  /* ── RESULT ── */
  #result { align-items: center; justify-content: flex-start; padding: 0 0 80px; }

  .result-hero {
    width: 100%;
    background: var(--text);
    padding: 64px 28px 52px;
    text-align: center;
  }

  .result-tag {
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 700;
  }

  .result-type {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 12vw, 76px);
    line-height: 1;
    margin-bottom: 10px;
    color: #fff;
    letter-spacing: 2px;
  }

  .result-name {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 4px;
    margin-bottom: 32px;
    font-weight: 700;
  }

  .result-bio-intro {
    max-width: 460px;
    margin: 0 auto 20px;
    font-size: 14px;
    line-height: 1.85;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    text-align: center;
  }

  .result-bio-intro strong {
    color: rgba(255,255,255,0.9);
    font-weight: 700;
  }

  .result-highlights {
    list-style: none;
    max-width: 420px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-highlights li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    text-align: left;
  }

  .result-highlights li::before {
    content: '—';
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .result-body {
    max-width: 500px;
    width: 100%;
    padding: 48px 28px 0;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 700;
  }

  .score-section { margin-bottom: 44px; }

  .score-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }

  .score-dim {
    font-size: 12px;
    color: var(--muted);
    width: 44px;
    flex-shrink: 0;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .score-track { flex:1; height:3px; background:var(--border); overflow:hidden; }

  .score-bar {
    height: 100%;
    background: var(--accent);
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0;
  }

  .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--text);
    width: 28px;
    text-align: right;
  }

  .divider { height:1px; background:var(--border); margin:36px 0; }

  .match-logic {
    margin-bottom: 44px;
  }

  .match-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
  }

  .match-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1px;
    width: 64px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .match-val {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    flex: 1;
  }

  .dim-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .dim-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .dim-chip.top {
    border-color: var(--accent);
    background: #fdf5f4;
    color: var(--accent);
  }

  .dim-chip-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
  }

  .match-method {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    letter-spacing: 1px;
  }

  .method-rule { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .method-cosine { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

  .others-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  .other-card {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 16px;
  }

  .other-name { font-size:12px; font-weight:700; margin-bottom:2px; color:var(--text); }
  .other-ref  { font-size:11px; color:var(--muted); margin-bottom:8px; }

  .other-match-bar { height:2px; background:var(--border); overflow:hidden; }
  .other-match-fill { height:100%; background:var(--accent); opacity:0.45; }

  .share-row { display:flex; flex-direction:column; gap:10px; margin-top:44px; }

  .btn-share {
    background: var(--text);
    border: none;
    color: #fff;
    padding: 16px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    transition: background 0.15s;
    width: 100%;
  }
  .btn-share:hover { background: var(--accent); }

  .btn-retry {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 14px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    transition: border-color 0.15s, color 0.15s;
    width: 100%;
  }
  .btn-retry:hover { border-color:var(--text); color:var(--text); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .screen.active .intro-inner { animation: fadeUp 0.5s ease both; }
  .quiz-body { animation: fadeUp 0.25s ease both; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--text);
    color: #fff;
    padding: 12px 28px;
    font-weight: 700;
    font-size: 13px;
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-inner">
    <div class="intro-headline">
      测一测你在团队里，到底是<em>哪种</em>不好惹的大佬
    </div>
    <button class="btn-start" onclick="startQuiz()">
      开始测试
      <span class="btn-arrow">→</span>
    </button>
    <div class="intro-meta">16 题 · 约 3 分钟</div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="q-num" id="q-num">01</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="q-counter" id="q-counter">1 / 16</div>
  </div>
  <div class="quiz-body" id="quiz-body">
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="nav-row">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 上一题</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>继续 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-hero">
    <div class="result-tag">你的类型是</div>
    <div class="result-type" id="result-type"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-bio-intro" id="result-bio-intro"></div>
    <ul class="result-highlights" id="result-highlights"></ul>
  </div>
  <div class="result-body">
    <div class="score-section">
      <div class="section-label">维度得分</div>
      <div class="score-row"><div class="score-dim">冲劲</div><div class="score-track"><div class="score-bar" id="bar-drive"></div></div><div class="score-val" id="val-drive">0</div></div>
      <div class="score-row"><div class="score-dim">愿景</div><div class="score-track"><div class="score-bar" id="bar-vision"></div></div><div class="score-val" id="val-vision">0</div></div>
      <div class="score-row"><div class="score-dim">稳健</div><div class="score-track"><div class="score-bar" id="bar-steady"></div></div><div class="score-val" id="val-steady">0</div></div>
      <div class="score-row"><div class="score-dim">执行</div><div class="score-track"><div class="score-bar" id="bar-exec"></div></div><div class="score-val" id="val-exec">0</div></div>
    </div>
    <div class="divider"></div>
    <div class="match-logic">
      <div class="section-label">匹配逻辑</div>
      <div class="match-row">
        <div class="match-label">强项排名</div>
        <div class="match-val"><div class="dim-chips" id="dim-chips"></div></div>
      </div>
      <div class="match-row">
        <div class="match-label">触发规则</div>
        <div class="match-val" id="match-rule"></div>
      </div>
      <div class="match-row">
        <div class="match-label">匹配方式</div>
        <div class="match-val" id="match-method"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-label">其他接近类型</div>
    <div class="others-grid" id="others-grid"></div>
    <div class="share-row">
      <button class="btn-share" onclick="copyResult()">复制结果去晒 ↗</button>
      <button class="btn-retry" onclick="restartQuiz()">重新测一次</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">已复制！去朋友圈晒吧</div>

<script>
const TOTAL_Q = 16;

const questions = [
  { phase:1, text:"项目预算突然被砍一半，你第一反应？", options:[
    { text:"操，直接把目标改成用1/3预算干翻10倍，不然老子立马辞职", score:[3,1,0,0] },
    { text:"去他妈的，预算砍了就砍了，老子一个人也要把这项目干爆", score:[2,0,0,3] },
    { text:"爱砍不砍，不干了，世界这么操蛋谁还陪你们玩", score:[1,2,1,0] },
  ]},
  { phase:1, text:"deadline前一天团队还在推责任扯皮，你会？", options:[
    { text:"直接吼一句\"都他妈闭嘴，老子今晚通宵干完\"", score:[2,0,0,3] },
    { text:"当场发火把方案全撕了：\"这种垃圾也敢拿出来？\"", score:[1,0,0,2] },
    { text:"冷笑一声：\"行，都别干了，等着公司一起死\"", score:[0,1,2,1] },
  ]},
  { phase:1, text:"投资人问你三年计划，你最真实的回答是？", options:[
    { text:"三年？老子明年就干翻整个行业，不然不玩了", score:[3,1,0,0] },
    { text:"\"你们懂个屁，我们要的是把这个破世界砸出个坑\"", score:[2,2,0,0] },
    { text:"\"计划就是把所有挡路的人和公司全部干爆\"", score:[1,0,0,3] },
  ]},
  { phase:1, text:"看到同事明显摸鱼摆烂，你会？", options:[
    { text:"当场开掉，爱干不干，不干滚蛋", score:[1,0,0,3] },
    { text:"直接群里@他：\"要么给我干到死，要么现在打包走人\"", score:[2,0,0,2] },
    { text:"冷冷一句：\"继续摆，摆到公司倒闭大家一起完蛋\"", score:[0,1,2,1] },
  ]},
  { phase:2, text:"公司遇到重大危机，所有人慌乱时，你会？", options:[
    { text:"冷静计算长期复利，判断现在是该收缩还是继续压强", score:[0,0,3,2] },
    { text:"系统性分析所有变量，重新制定多套长期应对方案", score:[0,1,2,2] },
    { text:"聚焦核心护城河，把资源集中到能产生十年复利的部分", score:[0,2,3,0] },
  ]},
  { phase:2, text:"你认为最有价值的决策方式是？", options:[
    { text:"用数据和模型把所有可能结果跑透，选长期价值最大的那条", score:[0,1,1,3] },
    { text:"建立系统和流程，让每一步都经得起时间检验", score:[0,0,3,2] },
    { text:"拒绝短期诱惑，坚持把一件事情做到极致深度", score:[0,2,2,1] },
  ]},
  { phase:2, text:"面对一个短期暴利但有长期风险的项目，你？", options:[
    { text:"用完整框架算清楚10年ROI，风险大于收益就坚决放弃", score:[0,1,2,3] },
    { text:"评估它对核心能力积累和品牌护城河的长期影响", score:[0,2,2,1] },
    { text:"优先考虑是否符合公司长期战略节奏和资源配置", score:[0,0,3,2] },
  ]},
  { phase:2, text:"你最认可的长期成功逻辑是？", options:[
    { text:"持续复利 + 极致耐心，把小优势积累成无法超越的壁垒", score:[0,0,3,1] },
    { text:"系统化思考 + 深度专注，把一件事情做到别人无法复制", score:[0,1,2,2] },
    { text:"长期压强 + 节奏控制，在时间维度上碾压对手", score:[1,0,2,2] },
  ]},
  { phase:3, text:"新项目启动，你最先想的是？", options:[
    { text:"这玩意儿能不能让用户用完直接原地尖叫\"真他妈香\"？", score:[0,3,0,1] },
    { text:"执行力拉满，谁拖后腿我直接雷霆出击军令状伺候", score:[1,0,0,3] },
    { text:"流量能不能像核弹一样爆炸？不爆炸我睡不着觉", score:[2,1,0,1] },
  ]},
  { phase:3, text:"半夜两点你最可能在干嘛？", options:[
    { text:"还在抠产品细节，改到用户跪下喊爸爸", score:[0,3,0,1] },
    { text:"盯着执行进度表，像催命鬼一样一个一个@", score:[1,0,0,3] },
    { text:"刷竞品数据，脑子里已经脑补流量暴涨的烟花现场", score:[2,1,0,1] },
  ]},
  { phase:3, text:"你最想喊的团队口号是？", options:[
    { text:"\"Are you OK？！不香我们一起死！\"", score:[0,3,0,1] },
    { text:"\"说到做到！不服就干！干不成就雷霆劈了！\"", score:[2,0,0,3] },
    { text:"\"流量为王，低价好货，谁不让增长我跟谁急眼！\"", score:[3,1,0,0] },
  ]},
  { phase:3, text:"你最容易发火的瞬间是？", options:[
    { text:"产品做得又丑又卡，用户体验像吃屎", score:[0,3,0,1] },
    { text:"执行力拉胯，还找一堆抽象借口", score:[1,0,0,3] },
    { text:"流量突然不涨了，像被世界背叛了一样", score:[3,1,0,0] },
  ]},

let answers = new Array(TOTAL_Q).fill(null);
let current = 0;

function startQuiz() { showScreen('quiz'); renderQ(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderQ() {
  const q = questions[current];
  const n = current + 1;
  document.getElementById('q-num').textContent = String(n).padStart(2,'0');
  document.getElementById('q-counter').textContent = `${n} / ${TOTAL_Q}`;
  document.getElementById('progress-fill').style.width = `${(n/TOTAL_Q)*100}%`;

  document.getElementById('question-text').textContent = q.text;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.setAttribute('data-label', ['A','B','C'][i]);
    btn.appendChild(document.createTextNode(opt.text));
    btn.onclick = () => selectOption(i);
    opts.appendChild(btn);
  });

  document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
  const nb = document.getElementById('btn-next');
  if (current === TOTAL_Q - 1) {
    nb.style.display = '';
    nb.disabled = answers[current] === null;
    nb.textContent = '查看结果 →';
  } else {
    nb.style.display = 'none';
  }

  const body = document.getElementById('quiz-body');
  body.style.animation = 'none';
  void body.offsetHeight;
  body.style.animation = 'fadeUp 0.25s ease both';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('btn-next').disabled = false;
  if (current < TOTAL_Q - 1) {
    setTimeout(() => { current++; renderQ(); }, 100);
  }
}

function nextQ() {
  if (answers[current] === null) return;
  if (current < TOTAL_Q - 1) { current++; renderQ(); }
  else showResult();
}

function prevQ() { if (current > 0) { current--; renderQ(); } }

function calcScores() {
  let drive=0, vision=0, steady=0, exec=0;
  answers.forEach((ans,qi) => {
    if (ans === null) return;
    const s = questions[qi].options[ans].score;
    drive+=s[0]; vision+=s[1]; steady+=s[2]; exec+=s[3];
  });
  return { drive, vision, steady, exec };
}

function cosineSim(u, r) {
  const dot  = u.reduce((s,v,i) => s+v*r[i], 0);
  const magU = Math.sqrt(u.reduce((s,v) => s+v*v, 0));
  const magR = Math.sqrt(r.reduce((s,v) => s+v*v, 0));
  return (magU && magR) ? dot/(magU*magR) : 0;
}

function showResult() {
  const { drive, vision, steady, exec } = calcScores();
  const uv = [drive, vision, steady, exec];

  let usedCosine = false;
  let matched = results.find(r => r.match(drive, vision, steady, exec));
  if (!matched) {
    usedCosine = true;
    matched = results.reduce((best, r) =>
      cosineSim(uv, r.vec) > cosineSim(uv, best.vec) ? r : best
    , results[0]);
  }

  // Hero: person name big, bio below
  document.getElementById('result-type').textContent = matched.ref;
  document.getElementById('result-name').textContent = matched.name;

  const introEl = document.getElementById('result-bio-intro');
  introEl.innerHTML = `<strong>（${matched.zhName}）</strong>${matched.intro}`;

  const hlEl = document.getElementById('result-highlights');
  hlEl.innerHTML = matched.highlights.map(h => `<li>${h}</li>`).join('');

  // Score bars
  const maxScore = Math.max(...uv, 1);
  setTimeout(() => {
    ['drive','vision','steady','exec'].forEach((dim,i) => {
      document.getElementById('bar-'+dim).style.width = Math.round(uv[i]/maxScore*100)+'%';
      document.getElementById('val-'+dim).textContent = uv[i];
    });
  }, 200);

  // Match logic: dim chips sorted by score
  const dims = [
    { label:'冲劲', val:drive },
    { label:'愿景', val:vision },
    { label:'稳健', val:steady },
    { label:'执行', val:exec },
  ].sort((a,b) => b.val - a.val);

  const chipsEl = document.getElementById('dim-chips');
  chipsEl.innerHTML = '';
  dims.forEach((d, i) => {
    const chip = document.createElement('span');
    chip.className = 'dim-chip' + (i === 0 ? ' top' : '');
    chip.innerHTML = `${d.label} <span class="dim-chip-score">${d.val}</span>`;
    chipsEl.appendChild(chip);
  });

  // Rule text
  document.getElementById('match-rule').textContent = matched.rule;

  // Match method
  const methodEl = document.getElementById('match-method');
  if (usedCosine) {
    methodEl.innerHTML = '<span class="match-method method-cosine">余弦相似度兜底</span> 无精确规则命中，按向量距离找最近的人';
  } else {
    methodEl.innerHTML = '<span class="match-method method-rule">精确规则命中</span> 你的得分满足该人物的专属匹配条件';
  }

  // Others grid
  const others = results
    .filter(r => r.id !== matched.id)
    .map(r => ({ ...r, sim: cosineSim(uv, r.vec) }))
    .sort((a,b) => b.sim-a.sim)
    .slice(0,4);

  const grid = document.getElementById('others-grid');
  grid.innerHTML = '';
  const maxSim = others[0]?.sim || 1;
  others.forEach(r => {
    const card = document.createElement('div');
    card.className = 'other-card';
    card.innerHTML = `<div class="other-name">${r.ref}</div><div class="other-ref">${r.name}</div><div class="other-match-bar"><div class="other-match-fill" style="width:${Math.round(r.sim/maxSim*100)}%"></div></div>`;
    grid.appendChild(card);
  });

  showScreen('result');
  window._rd = { matched, drive, vision, steady, exec };
}

function copyResult() {
  const d = window._rd;
  if (!d) return;
  const text = `【团队里哪种不好惹的大佬】\n我测出来是：${d.matched.ref}（${d.matched.zhName}）· ${d.matched.name}\n\n${d.matched.desc}\n\n你也来测测 👇`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showToast);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast();
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function restartQuiz() {
  answers = new Array(TOTAL_Q).fill(null);
  current = 0;
  startQuiz();
}
</script>
